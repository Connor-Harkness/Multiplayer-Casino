<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplayer Blackjack</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- Main Menu -->
        <div id="mainMenu" class="screen active">
            <div class="container">
                <h1 class="game-title">🃏 Multiplayer Blackjack</h1>
                <div class="menu-card">
                    <div class="welcome-message">
                        <p>Welcome to Blackjack!</p>
                        <p>Ready to play some cards?</p>
                    </div>
                    <div class="button-group">
                        <button id="createRoomBtn" class="btn btn-primary">Create Room</button>
                        <button id="joinRoomBtn" class="btn btn-secondary">Join Room</button>
                    </div>
                    <div class="back-to-lobby">
                        <a href="/" class="btn btn-secondary">← Back to Casino</a>
                    </div>
                </div>
            </div>
        </div>

        <!-- Join Room Dialog -->
        <div id="joinRoomDialog" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Join Room</h3>
                    <button class="close-btn" id="closeJoinDialog">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="input-group">
                        <label for="roomId">Room Code</label>
                        <input type="text" id="roomId" placeholder="Enter room code" maxlength="8">
                    </div>
                </div>
                <div class="modal-footer">
                    <button id="confirmJoinBtn" class="btn btn-primary">Join</button>
                    <button id="cancelJoinBtn" class="btn btn-secondary">Cancel</button>
                </div>
            </div>
        </div>

        <!-- Game Screen -->
        <div id="gameScreen" class="screen">
            <div class="game-container">
                <!-- Header -->
                <div class="game-header">
                    <div class="room-info">
                        <span class="room-code">Room: <span id="currentRoomCode"></span></span>
                        <span class="game-state" id="gameStateDisplay">Waiting in lobby...</span>
                    </div>
                    <button id="leaveRoomBtn" class="btn btn-danger">Leave Room</button>
                </div>

                <!-- Dealer Section -->
                <div id="dealerSection" class="dealer-section">
                    <div class="dealer-info">
                        <h3>🎩 Dealer</h3>
                        <div class="hand-value" id="dealerValue"></div>
                    </div>
                    <div class="cards" id="dealerCards"></div>
                </div>

                <!-- Players Section -->
                <div id="playersSection" class="players-section">
                    <div class="players-grid" id="playersGrid"></div>
                </div>

                <!-- Game Controls -->
                <div id="gameControls" class="game-controls">
                    <!-- Lobby Controls -->
                    <div id="lobbyControls" class="control-group active">
                        <button id="startGameBtn" class="btn btn-primary" disabled>Start Game</button>
                        <p class="help-text">Waiting for players... Empty seats will be filled with bots.</p>
                    </div>

                    <!-- Betting Controls -->
                    <div id="bettingControls" class="control-group">
                        <div class="betting-section">
                            <h4>Place Your Bet</h4>
                            <div class="bet-buttons">
                                <button class="bet-btn" data-amount="10">$10</button>
                                <button class="bet-btn" data-amount="25">$25</button>
                                <button class="bet-btn" data-amount="50">$50</button>
                                <button class="bet-btn" data-amount="100">$100</button>
                            </div>
                            <div class="custom-bet">
                                <input type="number" id="customBet" min="1" max="250" placeholder="Custom amount">
                                <button id="placeBetBtn" class="btn btn-primary">Place Bet</button>
                            </div>
                        </div>
                    </div>

                    <!-- Playing Controls -->
                    <div id="playingControls" class="control-group">
                        <div class="action-buttons">
                            <button id="hitBtn" class="btn btn-action">Hit</button>
                            <button id="standBtn" class="btn btn-action">Stand</button>
                        </div>
                        <div class="turn-indicator" id="turnIndicator"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
